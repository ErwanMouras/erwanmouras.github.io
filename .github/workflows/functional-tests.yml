# .github/workflows/functional-tests.yml
name: Tests fonctionnels NRT

on:
  pull_request:
    branches: [main]

jobs:
  functional-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Chromium
        run: npx playwright install chromium --with-deps

      - name: Attendre le déploiement Vercel preview
        id: vercel-url
        run: |
          for i in $(seq 1 30); do
            url=$(node scripts/get-vercel-url.mjs 2>/dev/null) || true
            if [ -n "$url" ]; then
              echo "url=$url" >> $GITHUB_OUTPUT
              echo "Preview disponible : $url"
              exit 0
            fi
            echo "Tentative $i/30 — preview pas encore prête, attente 10s..."
            sleep 10
          done
          echo "Preview Vercel non disponible après 5 minutes"
          exit 1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Exécuter les tests fonctionnels
        id: tests
        run: npx playwright test tests/functional/
        env:
          BASE_URL: ${{ steps.vercel-url.outputs.url }}
        continue-on-error: true

      - name: Poster le commentaire
        uses: actions/github-script@v7
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          PREVIEW_URL: ${{ steps.vercel-url.outputs.url }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        with:
          script: |
            const success = process.env.TEST_OUTCOME === 'success';
            const url = process.env.PREVIEW_URL;
            const runUrl = `https://github.com/${process.env.REPO}/actions/runs/${process.env.RUN_ID}`;
            const body = success
              ? `## ✅ Tests fonctionnels — Tous les tests passent (5 viewports)\n\nURL testée : ${url}`
              : `## ❌ Tests fonctionnels — Échec détecté\n\nURL testée : ${url}\n\nConsulter les [logs de l'Action](${runUrl}) pour le détail.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Échouer si les tests ont échoué
        if: steps.tests.outcome == 'failure'
        run: exit 1
